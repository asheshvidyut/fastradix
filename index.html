      iterator(prefix) {
        const it = new PatriciaIterator(this.root);
        it.started = false
        it.seekPrefix(prefix);
        return it;
      }
    }
    class PatriciaIterator {
      constructor(node) {
        this.node = node;
        this.stack = [];
        this.started = false;
        this.prefix = '';
      }
      seekPrefix(prefix) {
        this.stack = [];
        let n = this.node;
        let search = prefix;
        while (true) {
          if (!n) {
            this.node = null;
            return;
          }
          if (search.length === 0) {
            this.node = n;
            return;
          }
          let edge = n.getEdge(search[0]);
          if (!edge) {
            this.node = null;
            return;
          }
          let child = edge.node;
          // Defensive: if child is null, set node to null and return
          if (!child) {
            this.node = null;
            return;
          }
          if (search.startsWith(child.prefix)) {
            search = search.slice(child.prefix.length);
            n = child;
          } else if (child.prefix.startsWith(search)) {
            this.node = child;
            return;
          } else {
            this.node = null;
            return;
          }
        }
      }
      next() {
        if (!this.node) return { value: undefined, done: true };
        if (!this.started) {
          this.stack.push({ node: this.node });
          this.started = true;
        }
        while (this.stack.length > 0) {
          const { node } = this.stack.pop();
          // Push children in reverse order for pre-order traversal
          for (let i = node.children.length - 1; i >= 0; i--) {
            const edge = node.children[i];
            this.stack.push({ node: edge.node });
          }
          if (node.leaf) {
            return { value: node.key, done: false };
          }
        }
        return { value: undefined, done: true };
      }
      [Symbol.iterator]() { return this; }
    }
    // ====== END: Patricia Tree Implementation ======

    // Trie implementation from user
    class Node {
      constructor() {
        this.end = false;
        this.children = {};
      }
    }
    class Trie {
      constructor() {
        this.root = new Node();
      }
      insert(str, idx = 0, node = this.root) {
        if (idx === str.length) {
          node.end = true;
          return;
        }
        let key = str.toLowerCase()[idx];
        if (!node.children[key]) {
          node.children[key] = new Node();
        }
        this.insert(str, ++idx, node.children[key]);
      }
      getAllWords(currentWord = "", words = [], node = this.root) {
        if (node.end) {
          words.push(currentWord);
        }
        for (const letter in node.children) {
          this.getAllWords(currentWord + letter, words, node.children[letter]);
        }
        return words;
      }
      autoComplete(str) {
        if (str === "") return this.getAllWords();
        let node = this.root;
        str = str.toLowerCase();
        for (let i = 0; i < str.length; i++) {
          const char = str[i];
          if (!node.children[char]) {
            return [];
          }
          node = node.children[char];
        }
        return this.getAllWords(str, [], node);
      }
    }

    // Load words from words.txt
    async function loadWords() {  
      const response = await fetch('https://raw.githubusercontent.com/asheshvidyut/words/refs/heads/main/words.txt');
      const text = await response.text();
      return text.split('\n');
    }

    // Initialize everything
    let words, trie, radixTrie, patriciaTree;
    loadWords().then(wordList => {
      words = wordList;
      // Build Modified Radix Tree
      // Build Trie
      trie = new Trie();
      for (const word of words) {
        trie.insert(word);
      }
      // Build Radix Trie
      radixTrie = new Tree();
      for (const word of words) {
        radixTrie.insert(word);
      }
      // Build Patricia Tree
      patriciaTree = new PatriciaTree();
      for (const word of words) {
        patriciaTree.insert(word);
      }
      // Trigger initial search for blank string (without showing loader)
      if (typeof window !== 'undefined') {
        setTimeout(() => {
          performSearch("");
        }, 0);
      }
    });

    // Remove debounce and input event listener
    // document.getElementById('global-search-input').addEventListener('input', debounce(async function() {
    //   await search(this.value);
    // }, 200));

    // Store last results for each column
    window._lastTrieResults = [];
    window._lastPatriciaResults = [];
    window._lastRadixResults = [];
    const RESULTS_PER_PAGE = 50;
    window._triePage = 1;
    window._patriciaPage = 1;
    window._radixPage = 1;

    function renderResults(column) {
      let results = [];
      let page = 1;
      let resultsBox, paginationBox;
      if (column === 'trie') {
        results = window._lastTrieResults || [];
        page = window._triePage;
        resultsBox = document.getElementById('trie-results');
        paginationBox = document.getElementById('trie-pagination');
      } else if (column === 'patricia') {
        results = window._lastPatriciaResults || [];
        page = window._patriciaPage;
        resultsBox = document.getElementById('patricia-results');
        paginationBox = document.getElementById('patricia-pagination');
      } else if (column === 'radixtrie') {
        results = window._lastRadixResults || [];
        page = window._radixPage;
        resultsBox = document.getElementById('radixtrie-results');
        paginationBox = document.getElementById('radixtrie-pagination');
      }
      if (!resultsBox || !paginationBox) return;
      const totalPages = Math.max(1, Math.ceil(results.length / RESULTS_PER_PAGE));
      page = Math.max(1, Math.min(page, totalPages));
      // Store back the clamped page
      if (column === 'trie') window._triePage = page;
      if (column === 'patricia') window._patriciaPage = page;
      if (column === 'radixtrie') window._radixPage = page;
      const start = (page - 1) * RESULTS_PER_PAGE;
      const end = start + RESULTS_PER_PAGE;
      const pageResults = results.slice(start, end);
      resultsBox.innerHTML = pageResults.map(w => `<li>${w}</li>`).join('');
      // Pagination controls
      paginationBox.innerHTML = '';
      if (totalPages > 1) {
        const prevBtn = document.createElement('button');
        prevBtn.textContent = 'Previous';
        prevBtn.disabled = page === 1;
        prevBtn.className = 'pagination-btn';
        prevBtn.onclick = function() {
          if (column === 'trie') window._triePage--;
          if (column === 'patricia') window._patriciaPage--;
          if (column === 'radixtrie') window._radixPage--;
          renderResults(column);
        };
        const nextBtn = document.createElement('button');
        nextBtn.textContent = 'Next';
        nextBtn.disabled = page === totalPages;
        nextBtn.className = 'pagination-btn';
        nextBtn.onclick = function() {
          if (column === 'trie') window._triePage++;
          if (column === 'patricia') window._patriciaPage++;
          if (column === 'radixtrie') window._radixPage++;
          renderResults(column);
        };
        const pageInfo = document.createElement('span');
        pageInfo.textContent = `Page ${page} of ${totalPages}`;
        pageInfo.className = 'pagination-info';
        paginationBox.appendChild(prevBtn);
        paginationBox.appendChild(pageInfo);
        paginationBox.appendChild(nextBtn);
      }
    }

    function performSearch(prefix, showLoader = false) {
      // Per-column show results state
      const showTrieResults = window._showTrieResults ?? false;
      const showPatriciaResults = window._showPatriciaResults ?? false;
      const showRadixResults = window._showRadixResults ?? false;
      // Get DOM refs
      const trieTimingBox = document.getElementById('trie-timing');
      const trieResultsBox = document.getElementById('trie-results');
      const patriciaTimingBox = document.getElementById('patricia-timing');
      const patriciaResultsBox = document.getElementById('patricia-results');
      const radixTimingBox = document.getElementById('radixtrie-timing');
      const radixResultsBox = document.getElementById('radixtrie-results');
      // Show loaders if needed
      if (showLoader) trieResultsBox.innerHTML = '<div class="loader"><div class="loader-spinner"></div></div>';
      if (showLoader) patriciaResultsBox.innerHTML = '<div class="loader"><div class="loader-spinner"></div></div>';
      if (showLoader) radixResultsBox.innerHTML = '<div class="loader"><div class="loader-spinner"></div></div>';
      // Always clear only the results, not the timer
      if (!showTrieResults && !showLoader) trieResultsBox.innerHTML = '';
      if (!showPatriciaResults && !showLoader) patriciaResultsBox.innerHTML = '';
      if (!showRadixResults && !showLoader) radixResultsBox.innerHTML = '';
      // Always update timers unless data structure is not ready
      setTimeout(() => {
        Promise.all([
          // Trie
          new Promise(resolve => {
            if (!trie) {
              trieResultsBox.innerHTML = '';
              trieTimingBox.textContent = '';
              window._lastTrieResults = [];
              return resolve();
            }
            let total = 0, results = [];
            const t0 = performance.now();
            results = trie.autoComplete(prefix);
            const t1 = performance.now();
            total += (t1 - t0);
            window._lastTrieResults = results;
            if (showTrieResults) {
              renderResults('trie');
            } else if (!showLoader) {
              trieResultsBox.innerHTML = '';
              document.getElementById('trie-pagination').innerHTML = '';
            }
            trieTimingBox.textContent = `\u23f1 ${ total.toFixed(2) } ms | Results: ${results.length}`;
            resolve();
          }),
          // Patricia
          new Promise(resolve => {
            if (!patriciaTree) {
              patriciaResultsBox.innerHTML = '';
              patriciaTimingBox.textContent = '';
              window._lastPatriciaResults = [];
              return resolve();
            }
            let total = 0, results = [];
            const t0 = performance.now();
            const it = patriciaTree.iterator(prefix);
            results = [];
            let next = it.next();
            while (!next.done) {
              results.push(next.value);
              next = it.next();
            }
            const t1 = performance.now();
            total += (t1 - t0);
            window._lastPatriciaResults = results;
            if (showPatriciaResults) {
              renderResults('patricia');
            } else if (!showLoader) {
              patriciaResultsBox.innerHTML = '';
              document.getElementById('patricia-pagination').innerHTML = '';
            }
            patriciaTimingBox.textContent = `⏱ ${ total.toFixed(2) } ms | Results: ${results.length}`;
            resolve();
          }),
          // Radix
          new Promise(resolve => {
            if (!radixTrie) {
              radixResultsBox.innerHTML = '';
              radixTimingBox.textContent = '';
              window._lastRadixResults = [];
              return resolve();
            }
            let total = 0, results = [];
            const t0 = performance.now();
            results = radixTrie.getByPrefix(prefix);
            const t1 = performance.now();
            total += (t1 - t0);
            window._lastRadixResults = results;
            if (showRadixResults) {
              renderResults('radixtrie');
            } else if (!showLoader) {
              radixResultsBox.innerHTML = '';
              document.getElementById('radixtrie-pagination').innerHTML = '';
            }
            radixTimingBox.textContent = `\u23f1 ${ total.toFixed(2) } ms | Results: ${results.length}`;
            resolve();
          })
        ]);
      }, showLoader ? 0 : 1);
    }

    // Add event listener for input/checkbox to trigger search
    document.getElementById('global-search-input').addEventListener('input', function() {
      window._triePage = 1;
      window._patriciaPage = 1;
      window._radixPage = 1;
      performSearch(this.value);
    });
    // Per-column show results button logic
    function toggleShowResults(column) {
      if (column === 'trie') {
        window._showTrieResults = !window._showTrieResults;
        document.getElementById('trie-show-results-btn').classList.toggle('active', window._showTrieResults);
        if (window._showTrieResults) {
          renderResults('trie');
        } else {
          document.getElementById('trie-results').innerHTML = '';
          document.getElementById('trie-pagination').innerHTML = '';
        }
      } else if (column === 'patricia') {
        window._showPatriciaResults = !window._showPatriciaResults;
        document.getElementById('patricia-show-results-btn').classList.toggle('active', window._showPatriciaResults);
        if (window._showPatriciaResults) {
          renderResults('patricia');
        } else {
          document.getElementById('patricia-results').innerHTML = '';
          document.getElementById('patricia-pagination').innerHTML = '';
        }
      } else if (column === 'radixtrie') {
        window._showRadixResults = !window._showRadixResults;
        document.getElementById('radixtrie-show-results-btn').classList.toggle('active', window._showRadixResults);
        if (window._showRadixResults) {
          renderResults('radixtrie');
        } else {
          document.getElementById('radixtrie-results').innerHTML = '';
          document.getElementById('radixtrie-pagination').innerHTML = '';
        }
      }
    }
    document.getElementById('trie-show-results-btn').addEventListener('click', function() { toggleShowResults('trie'); });
    document.getElementById('patricia-show-results-btn').addEventListener('click', function() { toggleShowResults('patricia'); });
    document.getElementById('radixtrie-show-results-btn').addEventListener('click', function() { toggleShowResults('radixtrie'); });
    // Optionally, add a button for accessibility
    // document.getElementById('global-search-btn').addEventListener('click', function() {
    //   const prefix = document.getElementById('global-search-input').value;
    //   performSearch(prefix, true);
    // });

    // Initialize all columns to hide results by default
    window._showTrieResults = false;
    window._showPatriciaResults = false;
    window._showRadixResults = false;

  </script>
